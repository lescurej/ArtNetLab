name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tauri:
    name: Build and Release
    runs-on: ${{ matrix.platform }}
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Set release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Invalid release version: ${process.env.GITHUB_REF_NAME}`);
          }

          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8");
          fs.writeFileSync(cargoPath, cargo.replace(/^version = ".*"$/m, `version = "${version}"`));
          NODE

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          # Try webkit2gtk 4.1, fall back to 4.0 if unavailable
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev || \
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.0-dev

      - name: Install WiX Toolset (Windows)
        if: ${{ matrix.platform == 'windows-latest' }}
        run: choco install wixtoolset -y

      - name: Import Apple code-signing certificate (macOS)
        if: ${{ runner.os == 'macOS' && env.MACOS_CERT_P12 != '' && env.MACOS_CERT_PASSWORD != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ env.MACOS_CERT_P12 }}
          p12-password: ${{ env.MACOS_CERT_PASSWORD }}

      - name: List available code signing identities (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: security find-identity -v -p codesigning || true

      - name: Build and upload release artifacts with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # macOS notarization (optional, macOS only)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Artnetlab ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.
            Assets include macOS (DMG), Windows, and Linux bundles.
          releaseDraft: false
          prerelease: false
          tauriScript: pnpm tauri
